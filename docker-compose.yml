  postgres:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: hydrodb
    ports:
      - '5432:5432'
    networks:
      - hydro-network

  redis:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --save 20 1 --loglevel warning --requirepass supersecret
    volumes:
      - cache:/data
    networks:
      - hydro-network
  
  mosquitto:
    build:
      context: ./mosquitto
    ports:
      - '1883:1883'
    networks:
      - hydro-network


  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: supersecret
    ports:
      - '5672:5672'

volumes:
  pgdata:
  cache:

networks:
  hydro-network:
    driver: bridge